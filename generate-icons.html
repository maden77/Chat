<!DOCTYPE html>
<html>
<head><title>Generate Icons for SecureChat</title></head>
<body>
    <h2>Klik tombol untuk download icon</h2>
    <button onclick="generateAll()">Download Icons</button>
    
    <canvas id="c192" width="192" height="192" style="border:1px solid #ccc; margin:10px;"></canvas>
    <canvas id="c512" width="512" height="512" style="border:1px solid #ccc; margin:10px;"></canvas>
    
    <script>
    function generateIcon(size, canvasId) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        
        // Background gradient
        const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
        grad.addColorStop(0, '#00cec9');
        grad.addColorStop(0.7, '#00b894');
        grad.addColorStop(1, '#00856a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, size, size);
        
        // Border
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = size * 0.02;
        ctx.strokeRect(size*0.05, size*0.05, size*0.9, size*0.9);
        
        // Lock icon
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `${size * 0.5}px serif`;
        ctx.fillText('🔒', size/2, size/2 - size*0.05);
        
        // Text
        ctx.font = `bold ${size * 0.08}px sans-serif`;
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.fillText('SECURE', size/2, size*0.85);
    }

    function generateAll() {
        generateIcon(192, 'c192');
        generateIcon(512, 'c512');
        
        // Download
        document.querySelectorAll('canvas').forEach(canvas => {
            const link = document.createElement('a');
            const name = canvas.id === 'c192' ? 'icon-192.png' : 'icon-512.png';
            link.download = name;
            link.href = canvas.toDataURL('image/png');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
        
        alert('✅ Icons downloaded!');
    }
    </script>
</body>
</html>
